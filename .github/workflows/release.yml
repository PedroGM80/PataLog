name: Build and Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows Installers

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          cache-dependency-path: app/build.gradle.kts

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Validate Python setup
        run: |
          python --version
          pip --version
          pyinstaller --version

      - name: Build backend with PyInstaller
        run: |
          cd backend
          python -m PyInstaller patalog-backend.spec --distpath="../dist/patalog-backend"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "Backend build completed successfully"
          Get-ChildItem -Path "..\dist" -Recurse

      - name: Validate backend build
        run: |
          if (-not (Test-Path "dist/patalog-backend")) {
            Write-Host "ERROR: Backend build failed - patalog-backend not found"
            exit 1
          }
          Write-Host "Backend validation passed"

      - name: Build frontend with Gradle
        run: |
          cd app
          gradle clean packageMsi --info
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate installer build
        run: |
          $msiFiles = @(Get-ChildItem -Path "app/build/compose/binaries/main/msi" -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue)
          $exeFiles = @(Get-ChildItem -Path "app/build/compose/binaries/main/exe" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue)

          Write-Host "=== Build Artifacts Found ==="
          Write-Host "MSI files: $($msiFiles.Count)"
          Write-Host "EXE files: $($exeFiles.Count)"

          if ($msiFiles.Count -eq 0) {
            Write-Host "WARNING: No MSI files found"
          }
          if ($exeFiles.Count -eq 0) {
            Write-Host "WARNING: No EXE files found"
          }

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: PataLog-Windows-MSI
          path: app/build/compose/binaries/main/msi/**/*.msi
          if-no-files-found: warn

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: PataLog-Windows-EXE
          path: app/build/compose/binaries/main/exe/**/*.exe
          if-no-files-found: warn

      - name: Build summary
        if: always()
        run: |
          Write-Host "=== Build Summary ==="
          Write-Host "Windows build completed"
          Write-Host "Artifacts will be available in GitHub Actions"

  build-linux:
    runs-on: ubuntu-latest
    name: Build Linux DEB Package

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          cache-dependency-path: app/build.gradle.kts

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Validate Python setup
        run: |
          python --version
          pip --version
          pyinstaller --version

      - name: Build backend with PyInstaller
        run: |
          cd backend
          python -m PyInstaller patalog-backend.spec --distpath="../dist/patalog-backend"
          [ $? -eq 0 ] && echo "Backend build completed successfully" || exit 1
          ls -lah ../dist/

      - name: Validate backend build
        run: |
          if [ ! -d "dist/patalog-backend" ]; then
            echo "ERROR: Backend build failed - patalog-backend not found"
            exit 1
          fi
          echo "Backend validation passed"

      - name: Build frontend with Gradle
        run: |
          cd app
          gradle clean packageDeb --info
          [ $? -eq 0 ] || exit 1

      - name: Validate DEB build
        run: |
          DEB_COUNT=$(find app/build/compose/binaries/main -name "*.deb" -type f 2>/dev/null | wc -l)
          echo "=== Build Artifacts Found ==="
          echo "DEB files: $DEB_COUNT"
          if [ $DEB_COUNT -eq 0 ]; then
            echo "WARNING: No DEB files found"
          fi

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: PataLog-Linux-DEB
          path: app/build/compose/binaries/main/deb/**/*.deb
          if-no-files-found: warn

      - name: Build summary
        if: always()
        run: |
          echo "=== Build Summary ==="
          echo "Linux build completed"
          echo "Artifacts will be available in GitHub Actions"

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    name: Create Release

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows MSI
        uses: actions/download-artifact@v4
        with:
          name: PataLog-Windows-MSI
          path: release-artifacts/

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: PataLog-Windows-EXE
          path: release-artifacts/
        continue-on-error: true

      - name: Download Linux DEB
        uses: actions/download-artifact@v4
        with:
          name: PataLog-Linux-DEB
          path: release-artifacts/
        continue-on-error: true

      - name: Display artifacts
        run: |
          echo "=== Release Artifacts ==="
          find release-artifacts/ -type f
          ls -lh release-artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
