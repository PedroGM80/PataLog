name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  backend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8 pylint black isort bandit mypy

      - name: Check code formatting with black
        run: black backend/src --check --diff
        continue-on-error: true

      - name: Check import ordering with isort
        run: isort backend/src --check-only --diff
        continue-on-error: true

      - name: Lint backend with flake8
        run: |
          echo "=== Flake8 - Code Style ==="
          flake8 backend/src --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Lint backend with pylint
        run: |
          echo "=== Pylint - Code Quality ==="
          pylint backend/src --exit-zero --max-line-length=127
        continue-on-error: true

      - name: Security check with bandit
        run: |
          echo "=== Bandit - Security Analysis ==="
          bandit -r backend/src --exit-zero
        continue-on-error: true

      - name: Type checking with mypy
        run: |
          echo "=== MyPy - Type Checking ==="
          mypy backend/src --ignore-missing-imports --exit-code=0
        continue-on-error: true

      - name: Verify backend imports
        run: |
          python -c "import sys; sys.path.insert(0, 'backend'); from src.main import *; print('Backend imports OK')"
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Kotlin linter (ktlint)
        run: cd app && gradle ktlintCheck --stacktrace
        continue-on-error: true

      - name: Run code analysis (Detekt)
        run: cd app && gradle detekt --stacktrace
        continue-on-error: true

      - name: Build frontend with Gradle
        run: cd app && gradle build --stacktrace
        continue-on-error: true

      - name: Run frontend tests with coverage
        run: cd app && gradle test jacocoTestReport --stacktrace
        continue-on-error: true

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports
          path: app/build/reports

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: app/build/reports/jacoco
